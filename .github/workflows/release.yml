name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Version or tag
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run tag
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    name: Build & release macOS
    needs: release
    if: needs.release.outputs.published == 'true' && contains(needs.release.outputs.publishedPackages, '@slashtalk/electron')
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Read desktop version
        id: ver
        run: echo "version=$(node -p "require('./apps/desktop/package.json').version")" >> "$GITHUB_OUTPUT"

      # TODO: switch back to `bun run dist:mac` (signed + notarized) once the
      # Developer ID Application cert + App Store Connect API key are wired up
      # as repo secrets. See README "Releasing the desktop app".
      - name: Build & package DMG (unsigned)
        working-directory: apps/desktop
        run: bun run dist:mac:unsigned

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "@slashtalk/electron@${{ steps.ver.outputs.version }}"
          name: "Slashtalk Desktop ${{ steps.ver.outputs.version }}"
          generate_release_notes: true
          files: apps/desktop/dist/Slashtalk-mac.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
