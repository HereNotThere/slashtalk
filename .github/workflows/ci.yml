name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: slashtalk
          POSTGRES_PASSWORD: slashtalk
          POSTGRES_DB: slashtalk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://slashtalk:slashtalk@localhost:5432/slashtalk_test
      REDIS_URL: redis://localhost:6379
      GITHUB_CLIENT_ID: test_client_id
      GITHUB_CLIENT_SECRET: test_client_secret
      JWT_SECRET: test_jwt_secret_for_ci_that_is_long_enough
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      BASE_URL: http://localhost:10000
      PORT: "10000"

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - run: bun install

      - name: Typecheck
        working-directory: apps/server
        run: bun run typecheck

      - name: Run tests
        working-directory: apps/server
        run: bun test
