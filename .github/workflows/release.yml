name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Version or tag
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run tag
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    name: Build & release macOS
    needs: release
    if: needs.release.outputs.published == 'true' && contains(needs.release.outputs.publishedPackages, '@slashtalk/electron')
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Read desktop version
        id: ver
        run: echo "version=$(node -p "require('./apps/desktop/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Decode App Store Connect API key
        id: apple_api_key
        run: |
          key_path="$RUNNER_TEMP/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"
          printf '%s' "${{ secrets.APPLE_API_KEY_BASE64 }}" | base64 --decode > "$key_path"
          echo "path=$key_path" >> "$GITHUB_OUTPUT"

      - name: Build & package desktop app (signed + notarized)
        working-directory: apps/desktop
        run: bun run dist:mac
        env:
          CSC_LINK: ${{ secrets.MAC_CERT_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_API_KEY: ${{ steps.apple_api_key.outputs.path }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: Verify auto-update metadata
        run: test -f apps/desktop/dist/latest-mac.yml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "@slashtalk/electron@${{ steps.ver.outputs.version }}"
          name: "Slashtalk Desktop ${{ steps.ver.outputs.version }}"
          generate_release_notes: true
          files: |
            apps/desktop/dist/Slashtalk-mac-*.dmg
            apps/desktop/dist/Slashtalk-mac-*.zip
            apps/desktop/dist/Slashtalk-mac-*.blockmap
            apps/desktop/dist/latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
